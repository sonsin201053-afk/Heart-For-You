<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Special Project for You</title>
    <style>
        body {
            background-color: #0a0a0a;
            margin: 0;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: 'Arial', sans-serif;
        }
        #heart {
            color: #ff2d55;
            font-size: 120px;
            cursor: pointer;
            filter: drop-shadow(0 0 20px #ff2d55);
            animation: beat 0.8s infinite alternate;
            user-select: none;
            z-index: 10;
        }
        @keyframes beat {
            to { transform: scale(1.2); filter: drop-shadow(0 0 40px #ff2d55); }
        }
        .small-heart {
            position: absolute;
            color: #ff708d;
            font-size: 20px;
            pointer-events: none;
            animation: fly 2s linear forwards;
        }
        @keyframes fly {
            to { transform: translate(var(--x), var(--y)); opacity: 0; }
        }
        #msg {
            position: absolute;
            bottom: 20%;
            color: white;
            font-size: 18px;
            text-shadow: 0 0 10px #ff2d55;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div id="heart">❤️</div>
    <div id="msg">ลองกดที่หัวใจดูดิ...</div>

    <script>
        const heart = document.getElementById('heart');
        const msg = document.getElementById('msg');
        const quotes = [
            "มึนหัวแต่ก็ยังอยากทำให้นะ 555",
            "ฝนตกแบบนี้ ดูแลตัวเองด้วยนะน้ำ",
            "อันนี้ตั้งใจเขียนสุดๆ เลยเนี่ย",
            "กดบ่อยจัง สงสัยจะชอบใจพี่ 🤣",
            "อ้วนหน้าคอมเพื่อเธอเลยนะ 555"
        ];
        let count = 0;

        heart.onclick = (e) => {
            // เปลี่ยนข้อความ
            msg.innerText = quotes[count % quotes.length];
            count++;

            // สร้างหัวใจกระจาย (Particle Effect)
            for (let i = 0; i < 8; i++) {
                const h = document.createElement('div');
                h.className = 'small-heart';
                h.innerHTML = '❤️';
                h.style.left = e.clientX + 'px';
                h.style.top = e.clientY + 'px';
                h.style.setProperty('--x', (Math.random() - 0.5) * 400 + 'px');
                h.style.setProperty('--y', (Math.random() - 0.5) * 400 + 'px');
                document.body.appendChild(h);
                setTimeout(() => h.remove(), 2000);
            }
        };
    </script>
</body>
</html>
