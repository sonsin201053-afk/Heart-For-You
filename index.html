<!DOCTYPE html>
<html lang="th">
<head>
    <style>
        body { background: #121212; color: #00ff41; font-family: 'Courier New', monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        #wheel-container { width: 300px; height: 100px; border: 3px solid #333; overflow: hidden; position: relative; display: flex; align-items: center; justify-content: center; background: #1e1e1e; box-shadow: 0 0 15px rgba(0, 255, 65, 0.2); }
        #wheel { display: flex; transition: transform 3s cubic-bezier(0.1, 0, 0, 1); }
        .number { min-width: 300px; text-align: center; font-size: 3rem; font-weight: bold; }
        button { margin-top: 20px; padding: 10px 25px; cursor: pointer; background: #00ff41; color: #000; border: none; font-weight: bold; }
    </style>
</head>
<body>
    <div id="wheel-container">
        <div id="wheel">
            <div id="result" class="number">??</div>
        </div>
    </div>
    <button onclick="spin()">เริ่มการสุ่ม</button>

    <script>
        function spin() {
            const wheel = document.getElementById('wheel');
            const result = document.getElementById('result');
            
            // สุ่มเลขที่ 1-40 แบบยุติธรรม
            const finalNumber = Math.floor(Math.random() * 40) + 1;
            
            // อนิเมชั่นเลขวิ่งหลอกๆ ก่อนหยุด
            let count = 0;
            let interval = setInterval(() => {
                result.innerText = Math.floor(Math.random() * 40) + 1;
                count++;
                if(count > 20) {
                    clearInterval(interval);
                    result.innerText = finalNumber; // แสดงผลจริง
                }
            }, 100);
        }
    </script>
</body>
</html>
