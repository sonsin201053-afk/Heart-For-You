<!DOCTYPE html>
<html>
<head>
    <style>
        body { 
            background: #000; color: #fff; font-family: 'Arial', sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            min-height: 100vh; margin: 0; text-align: center;
        }
        .heart {
            width: 50px; height: 50px; background: #ff69b4; position: relative;
            transform: rotate(-45deg); animation: beat 1.5s infinite; margin-bottom: 30px;
        }
        .heart::before, .heart::after {
            content: ""; width: 50px; height: 50px; background: #ff69b4;
            border-radius: 50%; position: absolute;
        }
        .heart::before { top: -25px; left: 0; }
        .heart::after { top: 0; left: 25px; }

        @keyframes beat { 0%, 100% { transform: rotate(-45deg) scale(1); } 50% { transform: rotate(-45deg) scale(1.2); } }
        
        .lyrics { font-size: 20px; line-height: 2; animation: fadeIn 3s ease-in; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>
    <div class="heart"></div>
    <div class="lyrics">
        <p>ได้โปรด... อย่าปล่อยมือจากฉันไป</p>
        <p>ได้โปรด... อย่าทำให้ฉันต้องเสียใจ</p>
        <p>PLEASE - Atom ชนกันต์</p>
    </div>
</body>
</html>
