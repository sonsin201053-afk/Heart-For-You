<!DOCTYPE html>
<html>
<head>
    <style>body { margin: 0; overflow: hidden; background: #000; }</style>
</head>
<body>
    <script type="module">
        import * as THREE from 'https://cdn.skypack.dev/three@0.136.0';

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // 1. หลุมดำตรงกลาง (Black Hole)
        const core = new THREE.Mesh(new THREE.SphereGeometry(2.5, 64, 64), new THREE.MeshBasicMaterial({ color: 0x000000 }));
        scene.add(core);

        // 2. เอฟเฟกต์แสงรอบๆ (Glow)
        const glow = new THREE.Mesh(new THREE.SphereGeometry(2.7, 64, 64), new THREE.MeshBasicMaterial({ color: 0xff4500, transparent: true, opacity: 0.2, side: THREE.BackSide }));
        scene.add(glow);

        // 3. วงแหวนพลังงาน (Energy Disks - 5000 points)
        const count = 5000;
        const geometry = new THREE.BufferGeometry();
        const positions = new Float32Array(count * 3);
        const colors = new Float32Array(count * 3);

        for (let i = 0; i < count; i++) {
            const angle = Math.random() * Math.PI * 2;
            const dist = 3 + Math.random() * 4;
            positions[i*3] = Math.cos(angle) * dist;
            positions[i*3+1] = (Math.random() - 0.5) * 0.3;
            positions[i*3+2] = Math.sin(angle) * dist;
            
            // สีสุ่มระหว่าง ส้ม-เหลือง-ขาว
            colors[i*3] = 1.0;
            colors[i*3+1] = 0.5 + Math.random() * 0.5;
            colors[i*3+2] = 0.0;
        }

        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
        
        const mat = new THREE.PointsMaterial({ size: 0.05, vertexColors: true, transparent: true, opacity: 0.9 });
        const particles = new THREE.Points(geometry, mat);
        scene.add(particles);

        camera.position.set(0, 3, 10);
        camera.lookAt(0, 0, 0);

        function animate(t) {
            requestAnimationFrame(animate);
            // หมุนแก๊ส
            particles.rotation.y += 0.005;
            // เอฟเฟกต์หายใจของหลุมดำ
            const scale = 1 + Math.sin(t * 0.005) * 0.05;
            glow.scale.set(scale, scale, scale);
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
