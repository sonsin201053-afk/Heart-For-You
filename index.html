<!DOCTYPE html>
<html>
<body style="background: #1a1a1a; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0;">
    <div id="heart" style="color: #ff4d4d; font-size: 100px; animation: beat 0.8s infinite alternate; cursor: pointer;">❤️</div>
    <style>
        @keyframes beat { to { transform: scale(1.4); } }
    </style>
    <script>
        document.getElementById('heart').onclick = () => alert('มึนหัวแต่ก็ยังปั่นมาให้ดูนะ 555');
    </script>
</body>
</html>
