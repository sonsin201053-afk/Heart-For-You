<!DOCTYPE html>
<html>
<head>
    <style>
        body { 
            background: #121212; /* สีดำสไตล์แฮ็กเกอร์ */
            color: #ff4757; /* สีแดงแบบเจ็บๆ */
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; margin: 0; font-family: 'Arial', sans-serif;
            overflow: hidden; /* กันไม่ให้ข้อความล้นจอตอนมันเลื่อน */
        }
        .lyrics { 
            font-size: 24px; font-weight: bold;
            text-align: center;
            animation: slideInOut 5s forwards; /* สั่งให้เลื่อนเข้า-ออกใน 5 วินาที */
        }

        @keyframes slideInOut {
            0% { transform: translateX(-100%); opacity: 0; } /* เลื่อนเข้ามาจากซ้าย */
            20% { transform: translateX(0); opacity: 1; }    /* ค้างไว้ */
            80% { transform: translateX(0); opacity: 1; }    /* ค้างไว้ */
            100% { transform: translateX(100%); opacity: 0; } /* เลื่อนออกไปทางขวา */
        }
    </style>
</head>
<body>

    <div class="lyrics">
        ถ้าเธอต้องเลือกระหว่างเขาและฉัน<br>
        ถ้าเป็นอย่างนั้น... ก็ไม่ต้องเลือกฉันเลย
    </div>

    <script>
        // รอ 5 วินาที (เท่ากับเวลาอนิเมชั่น) แล้วเด้งไป YouTube
        setTimeout(() => {
            window.location.href = "https://www.youtube.com/results?search_query=ILLSLICK+ถ้าเธอต้องเลือก";
        }, 5000);
    </script>

</body>
</html>
