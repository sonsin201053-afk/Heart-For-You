<!DOCTYPE html>
<html>
<head>
    <style>
        body { 
            background: #000; 
            color: #d4af37; /* สีทองๆ แบบเชยๆ แต่อมตะ */
            display: flex; flex-direction: column; 
            justify-content: center; align-items: center; 
            height: 100vh; margin: 0; 
            font-family: 'Courier New', Courier, monospace; /* ฟอนต์เครื่องพิมพ์ดีดดูเชยๆ เท่ดี */
        }
        h1 { letter-spacing: 5px; margin-bottom: 40px; }
        .btn { 
            padding: 20px 50px; font-size: 20px; cursor: pointer; 
            background: transparent; border: 2px solid #d4af37; 
            color: #d4af37; font-family: 'Courier New', monospace;
            text-transform: uppercase; transition: 0.4s;
        }
        .btn:hover { background: #d4af37; color: #000; box-shadow: 0 0 20px #d4af37; }
    </style>
</head>
<body>

    <h1>ILLSLICK</h1>
    
    <button class="btn" onclick="startPlay()">กดเพื่อเริ่มฟัง ILLSLICK</button>

    <script>
        function startPlay() {
            // เมื่อกดปุ่ม จะเด้งไปหน้า YouTube รวมเพลงพี่อิลแบบยาวๆ เลยครับ
            window.location.href = "https://www.youtube.com/results?search_query=ILLSLICK+เชยๆ";
        }
    </script>

</body>
</html>
